name: ci-setup

description: Sets up the CI environment for GKE Metadata Server workflows.

inputs:
  github-token:
    required: true
    description: The GitHub token to authenticate with.

runs:
  using: composite
  steps:
  - name: Free disk space
    shell: bash
    run: |
      set -eux
      df -h
      sudo rm -rf /usr/share/dotnet || true
      sudo rm -rf /opt/ghc || true
      sudo rm -rf /usr/local/share/boost || true
      sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
      sudo rm -rf /usr/local/lib/android || true
      docker system prune -af || true
      sudo apt-get clean || true
      df -h
  - uses: stefanprodan/timoni/actions/setup@c68e33a34f17c7ca93c7fc6717d61a14819276dc # main
  - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ inputs.github-token }}
  - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
  - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
  - name: Install dependencies
    shell: bash
    run: |
      sudo apt-get update && sudo apt-get install -y clang llvm bpfcc-tools libbpf-dev linux-tools-azure
