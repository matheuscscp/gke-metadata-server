name: pull-request

on:
  pull_request:
  workflow_dispatch:

permissions:
  statuses: write

concurrency:
  group: continuous-integration # lock for shared CI resources
  cancel-in-progress: false

jobs:
  # Post a pending commit status so that workflow_dispatch runs (used by the
  # upgrade workflows to trigger CI on bot-created PR branches) show up as a
  # check on the PR. Default GITHUB_TOKEN-created PRs do not auto-fire
  # workflows, so we dispatch manually and surface results via the statuses
  # API.
  e2e-pending:
    runs-on: ubuntu-latest
    steps:
    - name: Set pending status on PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
          -f state=pending \
          -f context="pull-request" \
          -f description="End-to-end tests running" \
          -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  e2e:
    # Matrix axis: which CNI / Cilium configuration the kind cluster runs.
    # cilium-default is the historical setup; cilium-kpr exercises Cilium's
    # kube-proxy-replacement (validates multi-attach coexistence with our
    # cgroup/connect4 redirect program); kindnet validates the README's "no
    # specific CNI required" claim by running on kind's default CNI.
    #
    # The aggregator job below is the one wired up to branch protection as
    # the required `pull-request` status check; this matrix job is what
    # actually runs the work.
    strategy:
      fail-fast: false
      matrix:
        cni: [cilium-default, cilium-kpr, kindnet]
    name: e2e (${{ matrix.cni }})
    runs-on: ubuntu-latest
    environment: pull-request
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        project_id: gke-metadata-server
        workload_identity_provider: projects/637293746831/locations/global/workloadIdentityPools/github-actions/providers/github-actions
        service_account: pull-request@gke-metadata-server.iam.gserviceaccount.com

    - uses: ./.github/actions/ci-setup/
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: 1.26.0
        cache: false
    - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
      with:
        version: v0.16.0

    - run: make tidy
    - name: Fail if make tidy produced changes
      run: |
        if [ -n "$(git diff --name-only)" ] || [ -n "$(git status --porcelain | grep '??')" ]; then
          git status
          echo ""
          echo "The command 'make tidy' produced differences."
          echo "Please remember to run it locally before committing your changes."
          echo ""
          exit 1
        fi

    - name: Install eBPF toolchain
      run: |
        sudo apt-get update && sudo apt-get install -y linux-tools-common linux-tools-generic libbpf-dev
        # Workaround: the runner kernel version may not match available linux-tools packages.
        # The bpftool wrapper at /usr/bin/bpftool directly invokes
        # /usr/lib/linux-tools/$(uname -r)/bpftool, so symlink the generic tools
        # directory there. Use ln -sfn to overwrite any existing entry.
        TOOLS_DIR=$(ls -d /usr/lib/linux-tools/*-generic 2>/dev/null | head -1)
        if [ -n "$TOOLS_DIR" ]; then
          sudo ln -sfn "$TOOLS_DIR" "/usr/lib/linux-tools/$(uname -r)"
        fi
    # Pipeline order is intentional:
    #   ci-cluster (kind + GCP provider) → build (local docker image, ~30-60s,
    #   acts as the GCP-propagation buffer) → build-go-test (same) →
    #   build-pytest (Python image for the DNS test pods) →
    #   kind-load-images → ci-test. Container images are built locally and
    #   loaded into kind's containerd; nothing is pushed to a registry for
    #   PR validation.
    - run: make gen-ebpf ci-cluster build build-go-test build-pytest kind-load-images ci-test
      env:
        PLATFORMS: linux/amd64
        CNI: ${{ matrix.cni }}

  # Aggregator wired up as the required `pull-request` status check in branch
  # protection. Runs after every matrix entry regardless of their outcome
  # (`if: always()`) and fails iff any matrix entry didn't succeed. This way
  # the required-checks list stays a single name independent of how many CNI
  # configurations the matrix grows to.
  pull-request:
    needs: [e2e-pending, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Update status on PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        result="${{ needs.e2e.result }}"
        if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=failure \
            -f context="pull-request" \
            -f description="End-to-end tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "e2e matrix result: $result"
          exit 1
        fi
        gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
          -f state=success \
          -f context="pull-request" \
          -f description="End-to-end tests passed" \
          -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
