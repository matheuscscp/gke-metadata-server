name: terraform-plan

on: [pull_request]

permissions: {}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: terraform-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        project_id: gke-metadata-server
        workload_identity_provider: projects/637293746831/locations/global/workloadIdentityPools/github-actions/providers/github-actions
        service_account: tf-plan@gke-metadata-server.iam.gserviceaccount.com
    - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
    - run: cd terraform/ && terraform init && terraform plan -no-color > plan.txt
    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        TITLE: Terraform Plan
        MESSAGE_FILE: terraform/plan.txt
      with:
        script: |
          const { TITLE, MESSAGE_FILE } = process.env
          const commentIdentifier = TITLE + ':'
          const msg = require('fs').readFileSync(MESSAGE_FILE).toString().trim()

          const issue_number = context.issue.number
          const { owner, repo } = context.repo
          const body = commentIdentifier + '\n\n' + "```\n" + msg + "\n```"

          const { data: comments } = await github.rest.issues.listComments({
            issue_number,
            owner,
            repo,
          })
          const previousComment = comments.find(c => c.body.includes(commentIdentifier))
          if (previousComment) {
            await github.rest.issues.updateComment({
              comment_id: previousComment.id,
              owner,
              repo,
              body,
            })
          } else {
            await github.rest.issues.createComment({
              issue_number,
              owner,
              repo,
              body,
            })
          }
