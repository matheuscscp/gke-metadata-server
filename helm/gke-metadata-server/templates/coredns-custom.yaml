{{- if not (or (eq .Values.dns.provider "None") (eq .Values.dns.provider "CoreDNSCustom")) }}
{{- fail (printf "invalid dns.provider value %q: must be None or CoreDNSCustom" .Values.dns.provider) }}
{{- end }}
{{- if eq .Values.dns.provider "CoreDNSCustom" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
  labels:
    app: gke-metadata-server
data:
  metadata.override: |
    template IN A metadata.google.internal {
      answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A 169.254.169.254"
    }
{{- end }}
