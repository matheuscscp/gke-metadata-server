{{- if (.Values.dnsProvider | default dict).coreDnsCustom }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  metadata.override: |
    template IN A metadata.google.internal {
      answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A 169.254.169.254"
    }
{{- end }}
